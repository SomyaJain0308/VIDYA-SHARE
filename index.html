    <script>
      (function () {
        var BUILD_VERSION = '2026-03-27-1015';
        var VERSION_KEY = 'vidya-share-build-version';
        var RELOAD_KEY = 'vidya-share-build-refresh';
        var cleanUrl = new URL(window.location.href);
        var hadRecoveryParam = cleanUrl.searchParams.has('refresh') || cleanUrl.searchParams.has('fresh') || cleanUrl.searchParams.has('boot');
        if (hadRecoveryParam) {
          cleanUrl.searchParams.delete('refresh');
          cleanUrl.searchParams.delete('fresh');
          cleanUrl.searchParams.delete('boot');
          window.history.replaceState(null, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
        }
        var storedVersion = '';

        try {
          storedVersion = window.localStorage.getItem(VERSION_KEY) || '';
        } catch (error) {
          storedVersion = '';
        }

        var shouldRefreshBuild = storedVersion && storedVersion !== BUILD_VERSION;

        try {
          window.localStorage.setItem(VERSION_KEY, BUILD_VERSION);
        } catch (error) {
          console.error('Could not persist build version:', error);
        }

        if (!('serviceWorker' in navigator)) {
          if (shouldRefreshBuild) {
            try {
              var refreshMarkerNoSw = window.sessionStorage.getItem(RELOAD_KEY);
              if (refreshMarkerNoSw !== BUILD_VERSION) {
                window.sessionStorage.setItem(RELOAD_KEY, BUILD_VERSION);
                var noSwUrl = new URL(window.location.href);
                noSwUrl.searchParams.set('refresh', BUILD_VERSION);
                window.location.replace(noSwUrl.toString());
                return;
              }
            } catch (error) {
              console.error('Build refresh failed:', error);
            }
          }
          return;
        }

        window.addEventListener('load', async function () {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));

            if ('caches' in window) {
              const cacheKeys = await window.caches.keys();
              await Promise.all(cacheKeys.map(function (cacheKey) {
                return window.caches.delete(cacheKey);
              }));
            }

            if (shouldRefreshBuild) {
              var refreshMarker = '';
              try {
                refreshMarker = window.sessionStorage.getItem(RELOAD_KEY) || '';
              } catch (error) {
                refreshMarker = '';
              }

              if (refreshMarker !== BUILD_VERSION) {
                try {
                  window.sessionStorage.setItem(RELOAD_KEY, BUILD_VERSION);
                } catch (error) {
                  console.error('Could not persist refresh marker:', error);
                }

                var refreshUrl = new URL(window.location.href);
                refreshUrl.searchParams.set('refresh', BUILD_VERSION);
                window.location.replace(refreshUrl.toString());
                return;
              }
            }
          } catch (error) {
            console.error('Early cache cleanup failed:', error);
          }
        });
